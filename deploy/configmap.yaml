apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-scanner-config
  namespace: proxy-scanner
  labels:
    app.kubernetes.io/part-of: proxy-scanner
data:
  # Scanner configuration
  SCAN_RATE: "50000"
  SCAN_PORTS: "3128,8080,1080,8888,9050,8443,3129,80,443,1081"

  # Validator configuration
  WORKERS: "500"
  TIMEOUT: "10"
  TEST_URL: "http://httpbin.org/ip"
  # ORIGIN_IP is auto-detected at startup. Set explicitly to override:
  # ORIGIN_IP: "203.0.113.10"

  # GeoIP databases are bundled in the validator image at /geoip/
  # Override paths only if mounting external/updated databases:
  # GEOIP_CITY_DB: "/geoip/GeoLite2-City.mmdb"
  # GEOIP_ASN_DB: "/geoip/GeoLite2-ASN.mmdb"

  # API configuration
  LISTEN_ADDR: ":8080"

  # Shared paths (must match PVC mount)
  SCAN_INPUT: "/data/candidates.json"
  DB_PATH: "/data/proxies.db"
