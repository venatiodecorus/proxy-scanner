apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-api
  namespace: proxy-scanner
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: proxy-scanner
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/part-of: proxy-scanner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: proxy-scanner
    spec:
      containers:
        - name: api
          image: ghcr.io/venatiodecorus/proxy-scanner-api:latest
          envFrom:
            - configMapRef:
                name: proxy-scanner-config
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: proxy-scanner-data
