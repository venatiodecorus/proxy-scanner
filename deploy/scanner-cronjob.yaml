apiVersion: batch/v1
kind: CronJob
metadata:
  name: proxy-scanner
  namespace: proxy-scanner
  labels:
    app.kubernetes.io/name: scanner
    app.kubernetes.io/part-of: proxy-scanner
    app.kubernetes.io/component: scanner
spec:
  # Run weekly on Sunday at 02:00 UTC
  schedule: "0 2 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Scan can take up to 24 hours at 50k pps
      activeDeadlineSeconds: 100800  # 28 hours
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scanner
            app.kubernetes.io/part-of: proxy-scanner
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scanner
              image: ghcr.io/venatiodecorus/proxy-scanner-scanner:latest
              envFrom:
                - configMapRef:
                    name: proxy-scanner-config
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: 500m
                  memory: 256Mi
                limits:
                  cpu: "2"
                  memory: 512Mi
              securityContext:
                # masscan needs NET_RAW for raw socket access
                capabilities:
                  add:
                    - NET_RAW
                readOnlyRootFilesystem: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: proxy-scanner-data
