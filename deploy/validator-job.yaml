# This Job should be triggered after the scanner CronJob completes.
# Options:
# 1. Schedule it as a second CronJob timed ~25 hours after the scanner
# 2. Use a Kubernetes Job triggered by a completion hook
# 3. Have the scan.sh script kubectl-create this job on completion
#
# This example shows it as a CronJob timed after the scanner.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: proxy-validator
  namespace: proxy-scanner
  labels:
    app.kubernetes.io/name: validator
    app.kubernetes.io/part-of: proxy-scanner
    app.kubernetes.io/component: validator
spec:
  # Run weekly on Monday at 06:00 UTC (after scanner finishes)
  schedule: "0 6 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Validation can take many hours depending on candidate count
      activeDeadlineSeconds: 86400  # 24 hours
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: validator
            app.kubernetes.io/part-of: proxy-scanner
        spec:
          restartPolicy: OnFailure
          containers:
            - name: validator
              image: ghcr.io/venatiodecorus/proxy-scanner-validator:latest
              envFrom:
                - configMapRef:
                    name: proxy-scanner-config
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: "1"
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 1Gi
              securityContext:
                readOnlyRootFilesystem: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: proxy-scanner-data
