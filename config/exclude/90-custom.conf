# ============================================================================
# Custom Exclusions
#
# Add networks here that have requested not to be scanned, or that have
# triggered abuse complaints. One CIDR per line. Comments start with #.
#
# Format:
#   <CIDR>    # <reason> (<date added>)
#
# Examples:
#   203.0.113.0/24    # Abuse complaint from ISP X (2025-01-15)
#   198.51.100.0/24   # Requested opt-out via email (2025-02-20)
#
# After editing this file:
#   1. Commit and push to main
#   2. GitHub Actions will rebuild the scanner image
#   3. FluxCD will roll out the updated image on the next reconciliation
#
# The new exclusions take effect on the next scheduled scan.
# ============================================================================
